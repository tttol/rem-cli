name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  update-version:
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.update.outputs.commit_sha }}
      version: ${{ steps.update.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Update version
        id: update
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: ${tag}" >&2
            exit 1
          fi

          tag_commit="$(git rev-parse HEAD)"
          main_commit="$(git rev-parse origin/main)"
          if [[ "${tag_commit}" != "${main_commit}" ]]; then
            echo "Release tag must point to the latest commit on main." >&2
            exit 1
          fi

          version="${tag#v}"
          sed -i.bak -E '/^\[package\]$/,/^\[/{s/^version = "[^"]+"$/version = "'"${version}"'"/;}' Cargo.toml
          rm Cargo.toml.bak
          cargo update -p rem-cli
          cargo metadata --locked --no-deps --format-version 1 > /dev/null

          if ! git diff --quiet -- Cargo.toml Cargo.lock; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Cargo.toml Cargo.lock
            git commit -m "chore: bump version to ${version}"
            git push origin HEAD:main
          fi

          echo "commit_sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

  build:
    needs: update-version
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: rem
            asset_name: rem-cli-aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: rem
            asset_name: rem-cli-x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: rem
            asset_name: rem-cli-x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: rem
            asset_name: rem-cli-aarch64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.update-version.outputs.commit_sha }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Verify version
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          actual_version="$(target/${{ matrix.target }}/release/${{ matrix.artifact_name }} --version)"
          expected_version="rem ${{ needs.update-version.outputs.version }}"
          if [ "${actual_version}" != "${expected_version}" ]; then
            echo "Expected ${expected_version}, but got ${actual_version}." >&2
            exit 1
          fi

      - name: Create tarball
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../${{ matrix.asset_name }}.tar.gz ${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
