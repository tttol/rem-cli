name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: rem
            asset_name: rem-cli-aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: rem
            asset_name: rem-cli-x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: rem
            asset_name: rem-cli-x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: rem
            asset_name: rem-cli-aarch64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Create signed macOS app bundle
        if: runner.os == 'macOS'
        run: |
          app_dir=target/${{ matrix.target }}/release/rem.app
          mkdir -p "$app_dir/Contents/MacOS"
          cp native/Info.plist "$app_dir/Contents/Info.plist"
          mv \
            target/${{ matrix.target }}/release/${{ matrix.artifact_name }} \
            "$app_dir/Contents/MacOS/rem"
          codesign --force --sign - "$app_dir"

          cat > target/${{ matrix.target }}/release/${{ matrix.artifact_name }} <<'EOF'
          #!/bin/sh
          exec "$(dirname "$0")/rem.app/Contents/MacOS/rem" "$@"
          EOF
          chmod +x target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Create tarball
        run: |
          cd target/${{ matrix.target }}/release
          if [ "${{ runner.os }}" = "macOS" ]; then
            tar -czvf ../../../${{ matrix.asset_name }}.tar.gz ${{ matrix.artifact_name }} rem.app
          else
            tar -czvf ../../../${{ matrix.asset_name }}.tar.gz ${{ matrix.artifact_name }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
